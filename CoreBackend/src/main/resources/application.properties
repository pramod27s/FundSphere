# --- Pinecone reindex safety net ---
# Drains grants where the inline async indexing call failed (or never ran).
# delay-ms       : how often the sweeper runs (uses fixedDelay so it can't overlap)
# initial-delay  : wait after app start so the indexer is ready
# batch-size     : max rows processed per sweep (sequential, so this also bounds FastAPI load)
# max-attempts   : after this many consecutive failures, a row is dead-lettered
#                  (still flagged in DB but no longer retried until reindex_attempts is reset to 0)
# backoff.base   : per-row backoff after each failure: base * 2^(attempts-1), clamped to max
reindex.sweep.delay-ms=300000
reindex.sweep.initial-delay-ms=60000
reindex.sweep.batch-size=25
reindex.sweep.max-attempts=5
reindex.backoff.base-seconds=60
reindex.backoff.max-seconds=3600

